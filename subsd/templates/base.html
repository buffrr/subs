<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}subsd{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        accent: { 400: '#fb923c', 500: '#f97316', 600: '#ea580c' },
                        surface: { 50: '#18181b', 100: '#1e1e22', 200: '#27272a', 300: '#303035', 400: '#3f3f46' },
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Inter', 'Segoe UI', 'sans-serif'],
                        mono: ['SF Mono', 'Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        body { background: #111113; }
        .card { background: #18181b; border: 1px solid #27272a; }
        .card-raised { background: #1e1e22; border: 1px solid #2e2e33; }
        .sidebar { background: #141416; border-right: 1px solid #27272a; }
        .console-bg { background: #0c0c0e; border-top: 1px solid #27272a; }
        .nav-active { background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.15); }
        .nav-link:hover { background: rgba(255,255,255,0.04); }
        .btn-primary { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); box-shadow: 0 0 20px rgba(249,115,22,0.2); }
        .btn-primary:hover { box-shadow: 0 0 30px rgba(249,115,22,0.35); transform: translateY(-0.5px); }
        .btn-secondary { background: #27272a; border: 1px solid #3f3f46; }
        .btn-secondary:hover { background: #303035; border-color: #52525b; }
        .input-field { background: #111113; border: 1px solid #27272a; color: #e4e4e7; }
        .input-field:focus { border-color: rgba(249,115,22,0.5); box-shadow: 0 0 0 3px rgba(249,115,22,0.08); outline: none; }
        .input-field::placeholder { color: #52525b; }
        .badge { background: #27272a; border: 1px solid #3f3f46; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.3s ease-out; }
        .scrollbar-thin::-webkit-scrollbar { width: 4px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
        @keyframes shimmer { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
        .shimmer { animation: shimmer 2s ease-in-out infinite; }
        .divider { border-color: #27272a; }
    </style>
</head>
<body class="h-full text-zinc-200 antialiased">
    <div class="flex h-full">
        <!-- Sidebar -->
        <aside class="fixed inset-y-0 left-0 z-40 flex w-[210px] flex-col sidebar">
            <!-- Logo -->
            <div class="flex h-14 items-center px-5 border-b divider">
                <a href="/" class="flex items-center gap-2.5">
                    <div class="flex h-7 w-7 items-center justify-center rounded-lg bg-gradient-to-br from-orange-400 to-orange-600 shadow-lg shadow-orange-500/20">
                        <svg class="h-3.5 w-3.5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <span class="text-[15px] font-bold text-zinc-100 tracking-tight">subs</span>
                </a>
            </div>

            <!-- Navigation -->
            <nav class="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto scrollbar-thin">
                <a href="/"
                   class="{% block nav_dashboard %}{% endblock %} nav-link group flex items-center gap-2.5 rounded-xl px-3 py-2 text-[13px] font-medium transition-all duration-200 {% block nav_dashboard_cls %}text-zinc-500 hover:text-zinc-300{% endblock %}">
                    <svg class="h-[18px] w-[18px] shrink-0 {% block nav_dashboard_icon %}text-zinc-600 group-hover:text-zinc-400{% endblock %}" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/>
                    </svg>
                    Dashboard
                </a>
                <a href="/ui/operate"
                   class="{% block nav_operate %}{% endblock %} nav-link group flex items-center gap-2.5 rounded-xl px-3 py-2 text-[13px] font-medium transition-all duration-200 {% block nav_operate_cls %}text-zinc-500 hover:text-zinc-300{% endblock %}">
                    <svg class="h-[18px] w-[18px] shrink-0 {% block nav_operate_icon %}text-zinc-600 group-hover:text-zinc-400{% endblock %}" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 01-3-3m3 3a3 3 0 100 6h13.5a3 3 0 100-6m-16.5-3a3 3 0 013-3h13.5a3 3 0 013 3m-19.5 0a4.5 4.5 0 01.9-2.7L5.737 5.1a3.375 3.375 0 012.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 01.9 2.7"/>
                    </svg>
                    Operate
                </a>
                <a href="/ui/certs"
                   class="{% block nav_certs %}{% endblock %} nav-link group flex items-center gap-2.5 rounded-xl px-3 py-2 text-[13px] font-medium transition-all duration-200 {% block nav_certs_cls %}text-zinc-500 hover:text-zinc-300{% endblock %}">
                    <svg class="h-[18px] w-[18px] shrink-0 {% block nav_certs_icon %}text-zinc-600 group-hover:text-zinc-400{% endblock %}" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                    </svg>
                    Certificates
                </a>
                <a href="/ui/settings"
                   class="{% block nav_settings %}{% endblock %} nav-link group flex items-center gap-2.5 rounded-xl px-3 py-2 text-[13px] font-medium transition-all duration-200 {% block nav_settings_cls %}text-zinc-500 hover:text-zinc-300{% endblock %}">
                    <svg class="h-[18px] w-[18px] shrink-0 {% block nav_settings_icon %}text-zinc-600 group-hover:text-zinc-400{% endblock %}" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.75">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    Settings
                </a>
            </nav>

            <!-- Sidebar Footer -->
            <div class="border-t divider px-4 py-3 space-y-1.5">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-1.5">
                        <span id="status-dot" class="h-2 w-2 rounded-full bg-zinc-600"></span>
                        <span id="status-sync" class="text-[11px] text-zinc-500">Connecting...</span>
                    </div>
                    <span id="status-chain" class="text-[11px] text-zinc-500 font-mono"></span>
                </div>
                <div class="flex items-center justify-between">
                    <span id="status-wallet" class="text-[11px] text-zinc-500 font-mono truncate max-w-[110px]"></span>
                    <span id="status-balance" class="text-[11px] text-zinc-500 font-mono"></span>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <div class="flex-1 ml-[210px]">
            <main class="min-h-screen pb-16">
                <div class="mx-auto max-w-5xl px-8 py-8">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <!-- Console -->
    <div id="rpc-console" class="fixed bottom-0 left-[210px] right-0 console-bg z-50 transition-all duration-200">
        <div onclick="toggleConsole()" class="flex items-center justify-between px-5 py-2 cursor-pointer hover:bg-white/[0.02] transition-colors">
            <div class="flex items-center gap-2">
                <svg id="console-chevron" class="w-3 h-3 text-zinc-500 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"/></svg>
                <span class="text-[11px] font-semibold text-zinc-400 uppercase tracking-wider">Console</span>
            </div>
            <div class="flex flex-wrap items-center gap-1.5" onclick="event.stopPropagation()">
                <div class="flex rounded-lg p-0.5 bg-surface-200">
                    <button id="btn-spaced" onclick="selectEndpoint('spaced')" class="px-2.5 py-0.5 rounded-md text-[11px] font-medium bg-accent-500/20 text-orange-400 transition-colors">Spaced</button>
                    <button id="btn-bitcoin" onclick="selectEndpoint('bitcoin')" class="px-2.5 py-0.5 rounded-md text-[11px] font-medium text-zinc-500 hover:text-zinc-300 transition-colors" style="display:none">Bitcoin</button>
                </div>
                <div class="h-3 w-px bg-zinc-700 mx-0.5"></div>
                <button onclick="fillCmd('getserverinfo',[])" class="px-2 py-0.5 rounded-md text-[11px] text-zinc-500 hover:text-zinc-200 hover:bg-white/[0.05] transition-colors">serverinfo</button>
                <button onclick="fillCmd('getspace',['@space'])" class="px-2 py-0.5 rounded-md text-[11px] text-zinc-500 hover:text-zinc-200 hover:bg-white/[0.05] transition-colors">getspace</button>
                <button onclick="fillCmd('walletlistspaces',[walletName])" class="px-2 py-0.5 rounded-md text-[11px] text-zinc-500 hover:text-zinc-200 hover:bg-white/[0.05] transition-colors">listspaces</button>
                <button onclick="fillCmd('walletgetbalance',[walletName])" class="px-2 py-0.5 rounded-md text-[11px] text-zinc-500 hover:text-zinc-200 hover:bg-white/[0.05] transition-colors">balance</button>
                <button onclick="fillDelegate()" class="px-2 py-0.5 rounded-md text-[11px] text-zinc-500 hover:text-zinc-200 hover:bg-white/[0.05] transition-colors">delegate</button>
                <div id="mine-action" class="flex items-center gap-1" style="display:none">
                    <div class="h-3 w-px bg-zinc-700 mx-0.5"></div>
                    <input type="text" id="mine-count" value="1" onclick="event.stopPropagation()" class="w-7 bg-surface-200 border border-zinc-700 rounded-md px-1 py-0.5 text-zinc-200 text-[11px] text-center focus:outline-none focus:border-accent-500/50">
                    <button onclick="mineBlocks()" class="px-2 py-0.5 rounded-md text-[11px] text-orange-400 hover:bg-white/[0.05] transition-colors font-medium">mine</button>
                </div>
            </div>
        </div>
        <div id="console-body" class="hidden px-5 pb-4 animate-fade-in">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div class="space-y-3">
                    <div>
                        <label class="block text-[11px] font-medium text-zinc-500 mb-1.5">Method</label>
                        <input type="text" id="rpc-method" placeholder="e.g. getserverinfo" class="w-full input-field rounded-xl px-3 py-2 font-mono text-sm transition-colors">
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium text-zinc-500 mb-1.5">Params</label>
                        <textarea id="rpc-params" placeholder='["@bitcoin"]' rows="4" class="w-full input-field rounded-xl px-3 py-2 font-mono text-sm transition-colors resize-none"></textarea>
                    </div>
                    <button onclick="sendRpcCommand()" class="w-full rounded-xl btn-primary px-4 py-2 text-sm font-medium text-white transition-all duration-200">Send</button>
                </div>
                <div>
                    <label class="block text-[11px] font-medium text-zinc-500 mb-1.5">Response</label>
                    <pre id="rpc-response" class="bg-surface-50 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-400 font-mono overflow-x-auto h-[186px] overflow-y-auto whitespace-pre-wrap scrollbar-thin">No response yet</pre>
                </div>
            </div>
        </div>
    </div>

    <script>
    let selectedEndpoint='spaced',endpoints={spaced:null,bitcoin:null},walletName='wallet';
    function toggleConsole(){const b=document.getElementById('console-body'),c=document.getElementById('console-chevron');b.classList.toggle('hidden');c.style.transform=b.classList.contains('hidden')?'':'rotate(180deg)'}
    function fillCmd(m,p){document.getElementById('rpc-method').value=m;document.getElementById('rpc-params').value=JSON.stringify(p);const b=document.getElementById('console-body');if(b.classList.contains('hidden'))toggleConsole()}
    function fillDelegate(){document.getElementById('rpc-method').value='walletsendrequest';document.getElementById('rpc-params').value=JSON.stringify([walletName,{"requests":[{"request":"delegate","space":"@space"}],"fee_rate":null,"force":false,"confirmed_only":false,"skip_tx_check":false}],null,2);const b=document.getElementById('console-body');if(b.classList.contains('hidden'))toggleConsole()}
    async function mineBlocks(){const c=parseInt(document.getElementById('mine-count').value)||1;document.getElementById('rpc-response').textContent=`Mining ${c} block(s)...`;const b=document.getElementById('console-body');if(b.classList.contains('hidden'))toggleConsole();try{const r=await fetch('/rpc/mine',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({count:c})});document.getElementById('rpc-response').textContent=JSON.stringify(await r.json(),null,2);if(r.ok)setTimeout(()=>location.reload(),500)}catch(e){document.getElementById('rpc-response').textContent=`Error: ${e.message}`}}
    async function initRpcConsole(){try{const r=await fetch('/rpc/endpoints');endpoints=await r.json();if(endpoints.wallet)walletName=endpoints.wallet;document.getElementById('status-wallet').textContent=endpoints.wallet;document.getElementById('status-balance').textContent=`${endpoints.balance_sats.toLocaleString()} sats`;document.getElementById('status-chain').textContent=`#${endpoints.tip_height}`;const s=document.getElementById('status-sync'),d=document.getElementById('status-dot');if(endpoints.synced){s.textContent=endpoints.network;s.className='text-[11px] text-emerald-400 font-medium';d.className='h-2 w-2 rounded-full bg-emerald-400 shadow-sm shadow-emerald-400/50'}else{s.textContent='Syncing...';s.className='text-[11px] text-amber-400';d.className='h-2 w-2 rounded-full bg-amber-400 animate-pulse'}if(endpoints.bitcoin){document.getElementById('btn-bitcoin').style.display='inline-flex';document.getElementById('mine-action').style.display='flex'}}catch(e){}}
    function selectEndpoint(ep){selectedEndpoint=ep;const a=document.getElementById('btn-spaced'),b=document.getElementById('btn-bitcoin');if(ep==='spaced'){a.className='px-2.5 py-0.5 rounded-md text-[11px] font-medium bg-accent-500/20 text-orange-400 transition-colors';b.className='px-2.5 py-0.5 rounded-md text-[11px] font-medium text-zinc-500 hover:text-zinc-300 transition-colors'}else{a.className='px-2.5 py-0.5 rounded-md text-[11px] font-medium text-zinc-500 hover:text-zinc-300 transition-colors';b.className='px-2.5 py-0.5 rounded-md text-[11px] font-medium bg-accent-500/20 text-orange-400 transition-colors'}}
    async function sendRpcCommand(){const m=document.getElementById('rpc-method').value.trim(),ps=document.getElementById('rpc-params').value.trim(),re=document.getElementById('rpc-response');if(!m){re.textContent='Error: Method required';return}let p=[];if(ps){try{p=JSON.parse(ps)}catch(e){re.textContent=`Error: ${e.message}`;return}}re.textContent='Sending...';try{const r=await fetch(`/rpc/${selectedEndpoint}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({method:m,params:p})});re.textContent=JSON.stringify(await r.json(),null,2)}catch(e){re.textContent=`Error: ${e.message}`}}
    initRpcConsole();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
