{% extends "base.html" %}
{% block title %}Requests - subsd{% endblock %}

{% block topbar_left %}
<span class="topbar-title">Handle Requests</span>
{% endblock %}

{% block content %}
<div class="anim" style="display:flex;flex-direction:column;gap:16px">

    <div class="card anim" style="animation-delay:.04s">
        <div class="section-header"><h3>Add Request</h3></div>
        <div class="section-body">
            <form id="addRequestForm" style="display:flex;flex-direction:column;gap:14px">
                <div class="two-col">
                    <div>
                        <label for="handle" class="form-label">Handle</label>
                        <input type="text" id="handle" placeholder="alice@example" class="input-field w-full" required>
                        <div class="form-hint">Format: name@space</div>
                    </div>
                    <div>
                        <label for="scriptPubkey" class="form-label">Script Pubkey <span class="hint">(optional)</span></label>
                        <input type="text" id="scriptPubkey" placeholder="5120..." class="input-field w-full">
                    </div>
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="btn-primary">Add Request</button>
                    <button type="button" onclick="generateRequest()" class="btn-secondary">Generate & Download</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card anim" style="animation-delay:.1s">
        <div class="section-header"><h3>Bulk Add</h3></div>
        <div class="section-body">
            <form id="bulkAddForm" style="display:flex;flex-direction:column;gap:14px">
                <textarea id="bulkJson" rows="5" placeholder='[{"handle": "alice@example", "script_pubkey": "5120..."}]' class="input-field w-full"></textarea>
                <button type="submit" class="btn-primary">Add All</button>
            </form>
        </div>
    </div>

    <div id="results" class="hidden card anim">
        <div class="section-header"><h3>Results</h3></div>
        <div class="section-body"><pre id="resultsContent" class="code-block"></pre></div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function showResults(data) {
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('resultsContent').textContent = JSON.stringify(data, null, 2);
}

async function addRequests(requests) {
    try {
        const r = await fetch('/requests', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ requests })
        });
        showResults(await r.json());
    } catch (e) {
        showResults({ error: e.message });
    }
}

async function generateRequest() {
    const handle = document.getElementById('handle').value;
    if (!handle) { alert('Enter a handle'); return; }
    try {
        const r = await fetch('/requests/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ handle })
        });
        const j = await r.json();
        if (r.ok) {
            const blob = new Blob([JSON.stringify(j, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${handle.replace('@', '_')}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showResults({ message: 'Generated and downloaded', ...j });
        } else {
            showResults({ error: j });
        }
    } catch (e) {
        showResults({ error: e.message });
    }
}

/* Add single request */
document.getElementById('addRequestForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const handle = document.getElementById('handle').value;
    const scriptPubkey = document.getElementById('scriptPubkey').value;
    const reqs = [{ handle, script_pubkey: scriptPubkey || undefined }];

    if (!scriptPubkey) {
        try {
            const g = await fetch('/requests/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ handle })
            });
            if (!g.ok) { showResults(await g.json()); return; }
            const r = await g.json();
            reqs[0] = r.request;
            if (r.private_key) {
                showResults({
                    message: 'Request added with generated keypair',
                    private_key: r.private_key,
                    warning: 'Save this private key!'
                });
            }
        } catch (e) {
            showResults({ error: e.message });
            return;
        }
    }
    await addRequests(reqs);
});

/* Bulk add */
document.getElementById('bulkAddForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
        await addRequests(JSON.parse(document.getElementById('bulkJson').value));
    } catch (e) {
        showResults({ error: `Invalid JSON: ${e.message}` });
    }
});
</script>
{% endblock %}
